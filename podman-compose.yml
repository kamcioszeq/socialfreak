version: '3.8'
services:
  curator:
    image: localhost/newsautomation_curator:latest
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env
    network_mode: host
    volumes:
      - ./session:/app/session
      - ./data:/app/data
      - ./reels_cache:/app/reels_cache
    stdin_open: true
    tty: true
    restart: unless-stopped

  frontend:
    image: localhost/newsautomation_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    depends_on:
      - curator
